<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS-CI Boutique</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>JS-CI Boutique</h1>
    <p>Produits disponibles</p>
  </header>

  <div class="container">
    <div class="filters-card">
      <input type="text" id="searchInput" placeholder="Rechercher un produit..." />
      <select id="categoryFilter">
        <option value="all">Toutes les catégories</option>
        <option value="velo-electrique">Vélo électrique</option>
        <option value="moto-electrique">Moto électrique</option>
        <option value="savon">Savon</option>
      </select>
    </div>

    <div id="products" class="products-scroll">Chargement...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
